final_results:
  what_worked_well:
    - "The QUBO feature selection via Simulated Annealing effectively reduced the dataset dimensionality by over 80% while maintaining the raw predictive power of the classifiers."
    - "The architecture we designed proved to be extremely modular, allowing us to easily test different hyperparameters and classifiers."
    - "The Streamlit GUI provided a clean, user-friendly way to interact with the entire pipeline end-to-end."
  what_did_not_work_well:
    - "Combining multiple class imbalance handling techniques simultaneously caused unexpected F1-score drops."
    - "Generating unit tests via zero-shot prompts resulted in the AI hallucinating mock datasets instead of utilizing the physical dataset mandated by the specs."
  main_benefit_of_using_llm: "Drastically reduced time spent on writing code, documentation, and GUI."
  main_problem_of_using_llm: "The AI very often went beyond the requested specifications without realizing it, suggesting over-engineered solutions that required manual simplification to stay within constraints."
  surprising_findings:
    - "We were surprised by how much more effective simple decision threshold tuning was compared to complex class weighting techniques for optimizing the F1-score."
  limitations_of_the_solution:
    - "The pipeline relies on heuristics (Simulated Annealing) which does not guarantee the absolute global optimum for the QUBO problem."
    - "While our primary intent was to aggressively maximize the F1-score for the minority class, the extreme imbalance of the dataset remains a structural limitation that makes the models highly sensitive."
  threats_to_validity_from_team_perspective:
    - "Models performance might vary slightly on completely unseen datasets despite GridSearch."

